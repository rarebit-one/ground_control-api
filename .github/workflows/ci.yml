name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    uses: rarebit-one/.github/.github/workflows/reusable-gem-ci.yml@v1
    with:
      ruby-versions: '["3.4.4"]'
      lint-ruby-version: "3.4.4"
      extra-lint-commands: |
        bundle exec brakeman --no-pager --quiet
        bundle exec bundler-audit check --update
      test-command: |
        if find spec -name '*_spec.rb' 2>/dev/null | grep -q .; then
          bundle exec rspec
        else
          echo "No spec files found, skipping."
        fi
